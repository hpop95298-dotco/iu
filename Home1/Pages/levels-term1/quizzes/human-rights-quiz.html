<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Lab | Human Rights</title>
    <!-- Design System Core -->
    <link rel="stylesheet" href="../../../css/core/tokens.css">
    <link rel="stylesheet" href="../../../css/core/base.css">
    <link rel="stylesheet" href="../../../css/core/layout.css">
    <link rel="stylesheet" href="../../../css/core/components.css">
    <link rel="stylesheet" href="../../../css/core/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .quiz-layout { display: flex; gap: 30px; margin: 40px 0; align-items: flex-start; }
        .quiz-sidebar { width: 280px; position: sticky; top: 100px; max-height: calc(100vh - 120px); overflow-y: auto; padding: 25px; }
        .quiz-list { list-style: none; padding: 0; }
        .quiz-btn { width: 100%; text-align: left; padding: 12px 18px; border-radius: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #fff; cursor: pointer; transition: var(--transition-smooth); display: flex; align-items: center; gap: 12px; font-size: 0.95rem; }
        .quiz-btn:hover { border-color: var(--iu-accent); background: rgba(var(--iu-accent-rgb), 0.1); }
        .quiz-btn.active { background: var(--iu-accent); color: var(--iu-primary); font-weight: 700; border-color: var(--iu-accent); box-shadow: 0 0 15px var(--iu-accent-glow); }
        
        .quiz-main { flex: 1; padding: 40px; min-height: 500px; position: relative; }
        .assessment-header { margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        .progress-container { margin: 25px 0; }
        .progress-stats { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--iu-text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .question-card { margin-top: 30px; }
        .question-text { font-size: 1.3rem; margin-bottom: 25px; line-height: 1.5; color: #fff; }
        .options-grid { display: grid; gap: 15px; }
        .option-label { display: flex; align-items: center; gap: 15px; padding: 18px 25px; border-radius: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); cursor: pointer; transition: var(--transition-smooth); position: relative; overflow: hidden; }
        .option-label:hover { border-color: var(--iu-accent); background: rgba(var(--iu-accent-rgb), 0.05); }
        .option-label.selected { background: rgba(var(--iu-accent-rgb), 0.15); border-color: var(--iu-accent); box-shadow: 0 0 20px rgba(var(--iu-accent-rgb), 0.1); }
        .option-label input { position: absolute; opacity: 0; }
        .option-indicator { width: 22px; height: 22px; border: 2px solid var(--glass-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition-smooth); }
        .option-label.selected .option-indicator { border-color: var(--iu-accent); background: var(--iu-accent); }
        .option-label.selected .option-indicator::after { content: ''; width: 8px; height: 8px; background: var(--iu-primary); border-radius: 50%; }
        
        .quiz-footer { margin-top: 40px; display: flex; gap: 15px; padding-top: 30px; border-top: 1px solid var(--glass-border); }
        
        .result-view { text-align: center; padding: 40px 0; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; border: 5px solid var(--iu-accent); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 30px; background: rgba(var(--iu-accent-rgb), 0.1); }
        .score-val { font-size: 3rem; font-weight: 800; color: var(--iu-accent); line-height: 1; }
        .score-label { font-size: 0.9rem; color: var(--iu-text-muted); text-transform: uppercase; }
        
        .review-item { padding: 25px; border-radius: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); margin-bottom: 20px; }
        .review-q { font-weight: 700; margin-bottom: 15px; color: var(--iu-accent); }
        .review-opt { padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; }
        .review-opt.correct { background: rgba(76, 175, 80, 0.2); border: 1px solid #4CAF50; color: #81C784; }
        .review-opt.wrong { background: rgba(244, 67, 54, 0.2); border: 1px solid #F44336; color: #E57373; }
        .explanation-box { margin-top: 15px; padding: 15px; border-radius: 8px; background: rgba(var(--iu-accent-rgb), 0.05); font-size: 0.85rem; border-left: 3px solid var(--iu-accent); }

        /* RTL Support for Arabic Content in Cards */
        .rtl-content { direction: rtl; text-align: right; }
        .rtl-content .option-indicator { margin-left: 15px; margin-right: 0; }

        @media (max-width: 992px) {
            .quiz-layout { flex-direction: column; }
            .quiz-sidebar { width: 100%; position: relative; top: 0; max-height: none; }
        }
    </style>
</head>
<body class="faculty-theme">
    <div id="preloader"><div class="spinner"></div></div>

    <header>
        <div class="nav-container">
            <div class="logo">
                <img src="../../../images/iu-logo.png" alt="IU Logo">
                <span>IU | Assessment Lab</span>
            </div>
            <div class="menu-icon" id="menuToggle"><i class="fas fa-bars"></i></div>
            <nav id="navMenu">
                <a href="../level1-term1-pdf.html">Course Console</a>
                <a href="../level1-term1-video.html">Video Hub</a>
                <a href="../../iu.html" class="btn-premium btn-accent" style="padding: 8px 18px; margin-left: 15px;">Home</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="animate-up" style="margin-bottom: 30px;">
                <h1 style="color: var(--iu-accent); margin-bottom: 5px;">Human Rights & Ethics</h1>
                <p style="color: var(--iu-text-muted);">Assessing global integrity and legal frameworks</p>
            </div>

            <div class="quiz-layout animate-up" style="animation-delay: 0.1s;">
                <!-- Sidebar -->
                <aside class="glass-card quiz-sidebar">
                    <h3 style="font-size: 1.1rem; color: var(--iu-accent); margin-bottom: 25px; letter-spacing: 1px;">ASSESSMENT MODULES</h3>
                    <div class="quiz-list" id="quizList"></div>
                </aside>

                <!-- Core Assessment Area -->
                <div class="glass-card quiz-main" id="quizContainer"></div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div style="border-top: 1px solid var(--glass-border); padding-top: 30px; text-align: center; color: var(--iu-text-muted);">
            <p>© 2026 Innovation University — Global Ethics Bureau.</p>
        </div>
    </footer>

    <!-- Quiz Data -->
    <script type="application/json" id="quiz-data">
    [
      {"question":"أي وثيقة تعتبر أساس حقوق الإنسان الحديثة؟","options":["الإعلان العالمي لحقوق الإنسان","الميثاق المغناطيسي","دستور الولايات المتحدة","قانون نابليون"],"answer":0,"explanation":"تم اعتماد الإعلان العالمي لحقوق الإنسان في 1948 كمعيار دولي للحقوق الأساسية."},
      {"question":"حرية التعبير تصنف كـ:","options":["حق مدني","حق سياسي","حق اقتصادي","حق اجتماعي"],"answer":0,"explanation":"حرية التعبير هي حق مدني أصيل يحمي الأفراد من القمع والتدخل غير المبرر."},
      {"question":"حق التعليم يندرج تحت:","options":["حقوق اقتصادية","حقوق اجتماعية","حقوق ثقافية","حقوق سياسية"],"answer":1,"explanation":"التعليم يعتبر من الحقوق الاجتماعية التي تكفلها الدولة لتحسين الرفاه الإنساني."},
      {"question":"التعذيب:","options":["مسموح به وفق القانون","غير قانوني تحت أي ظرف","مسموح أثناء الحرب فقط","يعتمد على الدولة"],"answer":1,"explanation":"التعذيب محظور مطلقاً بموجب القانون الدولي والاتفاقيات العالمية لحقوق الإنسان."},
      {"question":"حقوق الإنسان:","options":["غير قابلة للتصرف","اختيارية","مشروطة","للمواطنين فقط"],"answer":0,"explanation":"حقوق الإنسان عالمية، غير قابلة للتجزئة وللتصرف، وهي ملك لكل إنسان ببساطة لكونه إنساناً."}
    ]
    </script>

    <script>
        const quizData = JSON.parse(document.getElementById('quiz-data').textContent);
        let currentQuizIndex = 0;
        let currentQuestion = 0;
        let userAnswers = [];

        function initSidebar() {
            const list = document.getElementById('quizList');
            for(let i=0; i<5; i++) {
                const btn = document.createElement('button');
                btn.className = 'quiz-btn' + (i === 0 ? ' active' : '');
                btn.innerHTML = `<i class="fas fa-gavel"></i> Module ${i+1}`;
                btn.onclick = () => startQuiz(i);
                list.appendChild(btn);
            }
        }

        function startQuiz(index) {
            currentQuizIndex = index;
            currentQuestion = 0;
            userAnswers = [];
            
            document.querySelectorAll('.quiz-btn').forEach((b, i) => {
                b.classList.toggle('active', i === index);
            });
            
            renderQuestion();
        }

        function renderQuestion() {
            const container = document.getElementById('quizContainer');
            const q = quizData[currentQuestion];
            const progress = ((currentQuestion + 1) / quizData.length) * 100;

            container.innerHTML = `
                <div class="assessment-header animate-up">
                    <h3 style="color: var(--iu-accent);">Verification Module ${currentQuizIndex + 1}</h3>
                    <div class="progress-container">
                        <div class="progress-stats">
                            <span>Step ${currentQuestion + 1} of ${quizData.length}</span>
                            <span>Progress: ${Math.round(progress)}%</span>
                        </div>
                        <div class="progress-bar-container" style="background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px;">
                            <div class="progress-bar" style="width: ${progress}%; height: 100%; background: var(--iu-accent); border-radius: 3px; box-shadow: 0 0 10px var(--iu-accent-glow);"></div>
                        </div>
                    </div>
                </div>

                <div class="question-card animate-up rtl-content" style="animation-delay: 0.1s;">
                    <p class="question-text">${q.question}</p>
                    <div class="options-grid">
                        ${q.options.map((opt, i) => `
                            <label class="option-label ${userAnswers[currentQuestion] === i ? 'selected' : ''}" onclick="selectOption(${i})">
                                <input type="radio" name="quiz-opt" ${userAnswers[currentQuestion] === i ? 'checked' : ''}>
                                <div class="option-indicator"></div>
                                <span style="flex: 1;">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>

                <div class="quiz-footer animate-up" style="animation-delay: 0.2s;">
                    ${currentQuestion > 0 ? `<button class="btn-premium" onclick="prevQuestion()" style="border-color: var(--glass-border); background: transparent;">Previous</button>` : ''}
                    <button class="btn-premium btn-accent" style="margin-left: auto;" onclick="nextQuestion()">
                        ${currentQuestion === quizData.length - 1 ? 'Finalize Result' : 'Next Step <i class="fas fa-arrow-right"></i>'}
                    </button>
                </div>
            `;
        }

        window.selectOption = (index) => {
            userAnswers[currentQuestion] = index;
            document.querySelectorAll('.option-label').forEach((l, i) => {
                l.classList.toggle('selected', i === index);
            });
        };

        window.nextQuestion = () => {
            if (userAnswers[currentQuestion] === undefined) {
                alert("Operational Halt: Please select an analytical value before proceeding.");
                return;
            }
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        };

        window.prevQuestion = () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        };

        function showResult() {
            const container = document.getElementById('quizContainer');
            let score = 0;
            userAnswers.forEach((ans, i) => {
                if(ans === quizData[i].answer) score++;
            });

            const percent = (score / quizData.length) * 100;
            const passed = percent >= 50;

            container.innerHTML = `
                <div class="result-view animate-up">
                    <div class="score-circle">
                        <span class="score-val">${score}</span>
                        <span class="score-label">/ ${quizData.length}</span>
                    </div>
                    <h2 style="color: ${passed ? '#4CAF50' : '#F44336'}; margin-bottom: 10px;">
                        ${passed ? 'CREDENTIALS VERIFIED' : 'EVALUATION FAILED'}
                    </h2>
                    <p style="color: var(--iu-text-muted); margin-bottom: 30px;">
                        ${passed ? 'Ethical integrity score exceeds minimum requirements for Level 1.' : 'Performance below required legal standards. Ethics review recommended.'}
                    </p>
                    <div style="display: flex; gap: 15px; justify-content: center;">
                        <button class="btn-premium btn-accent" onclick="reviewAnswers()">Review Analysis</button>
                        <button class="btn-premium" onclick="startQuiz(${currentQuizIndex})" style="border-color: var(--glass-border); background: transparent;">Retake Module</button>
                    </div>
                </div>
            `;
        }

        window.reviewAnswers = () => {
            const container = document.getElementById('quizContainer');
            let html = `
                <div class="assessment-header animate-up">
                    <h3 style="color: var(--iu-accent);">Rights Review | Module ${currentQuizIndex + 1}</h3>
                    <p style="font-size: 0.9rem; color: var(--iu-text-muted);">Detailed verification of legal logic versus established norms.</p>
                </div>
                <div class="animate-up rtl-content" style="animation-delay: 0.1s;">
            `;

            quizData.forEach((q, i) => {
                html += `
                    <div class="review-item">
                        <p class="review-q">0${i + 1}. ${q.question}</p>
                        <div class="options-grid">
                            ${q.options.map((opt, j) => {
                                let cls = '';
                                let icon = '';
                                if(j === q.answer) { cls = 'correct'; icon = '<i class="fas fa-check-circle"></i>'; }
                                if(userAnswers[i] === j && j !== q.answer) { cls = 'wrong'; icon = '<i class="fas fa-times-circle"></i>'; }
                                return `<div class="review-opt ${cls}">${opt} ${icon}</div>`;
                            }).join('')}
                        </div>
                        <div class="explanation-box" style="direction: rtl;">
                            <strong>Logic:</strong> ${q.explanation}
                        </div>
                    </div>
                `;
            });

            html += `
                </div>
                <div class="quiz-footer animate-up">
                    <button class="btn-premium btn-accent" onclick="startQuiz(${currentQuizIndex})" style="margin-left: auto;">Retake Assessment</button>
                </div>`;
            
            container.innerHTML = html;
        };

        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));

        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            setTimeout(() => {
                preloader.style.opacity = '0';
                setTimeout(() => preloader.style.display = 'none', 500);
            }, 800);
            initSidebar();
            startQuiz(0);
        });
    </script>
</body>
</html>
