<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Console | Entrepreneurship & Innovation</title>
    <!-- Design System Core -->
    <link rel="stylesheet" href="../../../css/core/tokens.css">
    <link rel="stylesheet" href="../../../css/core/base.css">
    <link rel="stylesheet" href="../../../css/core/layout.css">
    <link rel="stylesheet" href="../../../css/core/components.css">
    <link rel="stylesheet" href="../../../css/core/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .console-layout { display: flex; gap: 30px; margin: 40px 0; align-items: flex-start; }
        .console-sidebar { width: 320px; position: sticky; top: 100px; max-height: calc(100vh - 120px); overflow-y: auto; padding: 30px; }
        .lecture-list { list-style: none; padding: 0; }
        .lecture-btn { width: 100%; text-align: left; padding: 15px 20px; border-radius: 12px; margin-bottom: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #fff; cursor: pointer; transition: var(--transition-smooth); display: flex; align-items: center; gap: 12px; }
        .lecture-btn:hover { border-color: var(--iu-accent); background: rgba(var(--iu-accent-rgb), 0.1); }
        .lecture-btn.active { background: var(--iu-accent); color: var(--iu-primary); font-weight: 700; box-shadow: 0 0 15px var(--iu-accent-glow); border-color: var(--iu-accent); }
        .lecture-btn i { font-size: 1rem; opacity: 0.7; }
        .console-main { flex: 1; min-height: 500px; padding: 50px; position: relative; overflow: hidden; }
        .content-placeholder { text-align: center; color: var(--iu-text-muted); margin-top: 100px; }
        .content-placeholder i { font-size: 4rem; opacity: 0.3; margin-bottom: 20px; display: block; }
        
        @media (max-width: 992px) {
            .console-layout { flex-direction: column; }
            .console-sidebar { width: 100%; position: relative; top: 0; max-height: none; }
        }
    </style>
</head>
<body class="faculty-theme">
    <div id="preloader"><div class="spinner"></div></div>

    <header>
        <div class="nav-container">
            <div class="logo">
                <img src="../../../images/iu-logo.png" alt="IU Logo">
                <span>IU | Course Console</span>
            </div>
            <div class="menu-icon" id="menuToggle"><i class="fas fa-bars"></i></div>
            <nav id="navMenu">
                <a href="../quizzes/enterprenurship-quiz.html">Take Quiz</a>
                <a href="../level1-term1-pdf.html">All Courses</a>
                <a href="../level1-term1-video.html">Video Hub</a>
                <a href="../../iu.html" class="btn-premium btn-accent" style="padding: 8px 18px; margin-left: 15px;">Home</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="animate-up" style="margin-bottom: 30px;">
                <h1 style="color: var(--iu-accent); margin-bottom: 5px;">Entrepreneurship & Innovation</h1>
                <p style="color: var(--iu-text-muted);">Foundation Alpha | Academic Year 2026</p>
            </div>

            <div class="console-layout animate-up" style="animation-delay: 0.1s;">
                <!-- Sidebar -->
                <aside class="glass-card console-sidebar">
                    <h3 style="font-size: 1.1rem; color: var(--iu-accent); margin-bottom: 25px; letter-spacing: 1px;">CURRICULUM</h3>
                    <div class="lecture-list" id="lectureList"></div>
                </aside>

                <!-- Core Content -->
                <div class="glass-card console-main" id="lectureContent">
                    <div class="content-placeholder">
                        <i class="fas fa-lightbulb"></i>
                        <h2>Architect your future</h2>
                        <p>Select an innovation module from the curriculum sidebar to access strategy guides.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div style="border-top: 1px solid var(--glass-border); padding-top: 30px; text-align: center; color: var(--iu-text-muted);">
            <p>© 2026 Innovation University — Entrepreneurial Hub.</p>
        </div>
    </footer>

    <script>
        const lectures = [
            { title: "Lecture 1: Intro to Entrepreneurship", icon: "fa-rocket", content: "Entrepreneurship is the process of creating value by identifying opportunities and taking calculated risks to build sustainable organizations." },
            { title: "Lecture 2: Entrepreneurial Mindset", icon: "fa-brain", content: "Cultivating a mindset focused on resilience, creative problem-solving, and the ability to pivot in dynamic market conditions." },
            { title: "Lecture 3: Innovation Concepts", icon: "fa-bolt", content: "Defining innovation as the practical application of new ideas that result in improved products, services, or methodology." },
            { title: "Lecture 4: Business Creativity", icon: "fa-paint-brush", content: "Strategies for generating breakthrough ideas and leveraging creativity as a competitive advantage in business development." },
            { title: "Lecture 5: Market Analysis", icon: "fa-chart-pie", content: "Systematic data collection and evaluation of market size, competition, and customer behavior to inform strategic decisions." },
            { title: "Lecture 6: Business Models", icon: "fa-layer-group", content: "Designing the logic of how an organization creates, delivers, and captures value through structured business modeling." },
            { title: "Lecture 7: Startups & SMEs", icon: "fa-seedling", content: "Analyzing the lifecycle of early-stage ventures and the critical role of small and medium enterprises in global economic ecosystems." },
            { title: "Lecture 8: Innovation Strategies", icon: "fa-chess-knight", content: "Frameworks for integrating innovation into organizational DNA to achieve long-term growth and market disruption." },
            { title: "Lecture 9: Risk & Opportunity", icon: "fa-balance-scale", content: "Techniques for assessing potential hazards versus market opportunities to maximize entrepreneurial success rates." },
            { title: "Lecture 10: Case Studies", icon: "fa-briefcase", content: "In-depth review of successful global startups and internal innovation projects from across the technology sector." }
        ];

        function initSidebar() {
            const list = document.getElementById('lectureList');
            lectures.forEach((lec, index) => {
                const btn = document.createElement('button');
                btn.className = 'lecture-btn';
                btn.onclick = () => showLecture(index);
                btn.innerHTML = `<i class="fas ${lec.icon}"></i> ${lec.title}`;
                list.appendChild(btn);
            });
        }

        function showLecture(index) {
            const content = document.getElementById('lectureContent');
            const btns = document.querySelectorAll('.lecture-btn');
            
            btns.forEach(b => b.classList.remove('active'));
            btns[index].classList.add('active');
            
            content.style.opacity = '0';
            content.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                content.innerHTML = `
                    <div class="animate-up">
                        <h2 style="color: var(--iu-accent); margin-bottom: 25px; font-size: 2rem;">${lectures[index].title}</h2>
                        <div style="line-height: 1.8; color: rgba(255,255,255,0.9); font-size: 1.1rem; margin-bottom: 40px;">
                            <p>${lectures[index].content}</p>
                        </div>
                        <div class="glass-card" style="padding: 30px; background: rgba(var(--iu-accent-rgb), 0.05); border-left: 4px solid var(--iu-accent);">
                            <h4 style="color: var(--iu-accent); margin-bottom: 15px;"><i class="fas fa-file-pdf"></i> Strategy Portal</h4>
                            <p style="font-size: 0.9rem; color: var(--iu-text-muted); margin-bottom: 20px;">Download the official strategy frameworks and module notes for your venture development.</p>
                            <button class="btn-premium btn-accent">Download PDF <i class="fas fa-download"></i></button>
                        </div>
                    </div>
                `;
                content.style.opacity = '1';
                content.style.transform = 'translateY(0)';
            }, 150);
        }

        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));

        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            setTimeout(() => {
                preloader.style.opacity = '0';
                setTimeout(() => preloader.style.display = 'none', 500);
            }, 800);
            initSidebar();
        });
    </script>
</body>
</html>
