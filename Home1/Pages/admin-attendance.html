<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Registry | Innovation University</title>
    <!-- Design System Core -->
    <link rel="stylesheet" href="../css/core/tokens.css">
    <link rel="stylesheet" href="../css/core/base.css">
    <link rel="stylesheet" href="../css/core/layout.css">
    <link rel="stylesheet" href="../css/core/components.css">
    <link rel="stylesheet" href="../css/core/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        .admin-controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .admin-controls input, .admin-controls select { padding: 12px 18px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: #fff; outline: none; transition: var(--transition-smooth); }
        .admin-controls input:focus, .admin-controls select:focus { border-color: var(--iu-accent); box-shadow: 0 0 15px var(--iu-accent-glow); }
        .timeline-card { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 25px; margin-top: 35px; border: 1px solid var(--glass-border); }
        .timeline-list { list-style: none; padding: 0; }
        .timeline-item { padding: 15px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .timeline-item:last-child { border-bottom: none; }
        .quick-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    </style>
</head>

<body class="faculty-theme">
    <div id="preloader"><div class="spinner"></div></div>

    <header>
        <div class="nav-container">
            <div class="logo">
                <img src="../images/iu-logo.png" alt="IU Logo">
                <span>IU | Admin Registry</span>
            </div>
            <div class="menu-icon" id="menuToggle"><i class="fas fa-bars"></i></div>
            <nav id="navMenu">
                <a href="iu.html">Home</a>
                <a href="dashboard-admin.html">Dashboard</a>
                <a href="admin-attendance.html" class="active">Attendance</a>
                <a href="login.html" class="btn-premium btn-accent">Logout <i class="fas fa-sign-out-alt"></i></a>
            </nav>
        </div>
    </header>

  <main class="main-content">

        <h1 class="animate-up" style="text-align: center; margin-bottom: 50px; color: var(--iu-accent); font-size: 2.5rem;">Academic Attendance Console</h1>

        <div class="grid-stats animate-up">
            <div class="glass-card stat-card">
                <div class="stat-info">
                    <p style="color: var(--iu-text-muted); font-size: 0.9rem;">Registries</p>
                    <div class="value" id="totalStudents">0</div>
                </div>
                <div class="icon-box"><i class="fas fa-users" style="color: var(--iu-accent);"></i></div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-info">
                    <p style="color: #22c55e; font-size: 0.9rem;">Present Today</p>
                    <div class="value" id="presentToday" style="color: #22c55e;">0</div>
                </div>
                <div class="icon-box"><i class="fas fa-check-circle" style="color: #22c55e;"></i></div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-info">
                    <p style="color: #ef4444; font-size: 0.9rem;">Absences</p>
                    <div class="value" id="absentToday" style="color: #ef4444;">0</div>
                </div>
                <div class="icon-box"><i class="fas fa-times-circle" style="color: #ef4444;"></i></div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-info">
                    <p style="color: var(--iu-accent); font-size: 0.9rem;">Retention rate</p>
                    <div class="value" id="percent">0%</div>
                </div>
                <div class="icon-box"><i class="fas fa-chart-pie" style="color: var(--iu-accent);"></i></div>
            </div>
        </div>

        <div class="glass-card animate-up" style="margin-top: 30px; padding: 40px; animation-delay: 0.2s;">
            <div class="admin-controls">
                <input id="search" placeholder="Search by Student ID or Name..." oninput="renderTable()">
                <input type="date" id="date">
                <select id="type">
                    <option>Lecture</option>
                    <option>Practical Section</option>
                    <option>Examination</option>
                </select>
            </div>
            <div class="quick-actions" style="margin-bottom: 25px; justify-content: flex-end;">
                <button class="btn-premium btn-accent" style="background: rgba(34,197,94,0.1); color: #22c55e; border-color: #22c55e;" onclick="mark(true)">
                    <i class="fas fa-check"></i> Mark Present
                </button>
                <button class="btn-premium btn-accent" style="background: rgba(239,68,68,0.1); color: #ef4444; border-color: #ef4444;" onclick="mark(false)">
                    <i class="fas fa-times"></i> Mark Absent
                </button>
                <button class="btn-premium btn-glass" onclick="exportPDF()">
                    <i class="fas fa-file-pdf"></i> Generate Report
                </button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Full Name</th>
                            <th>Date</th>
                            <th>Event Type</th>
                            <th>Status</th>
                            <th>Management</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>

            <div class="timeline-card">
                <h4 style="color: var(--iu-accent); margin-bottom: 20px; display: flex; align-items:center; gap:10px;"><i class="fas fa-history"></i> Real-time Registry Log</h4>
                <ul class="timeline-list" id="recentList"></ul>
            </div>
        </div>
  </main>

    <footer class="main-footer">
        <div style="border-top: 1px solid var(--glass-border); padding-top: 30px; text-align: center; color: var(--iu-text-muted);">
            <p>© 2026 Innovation University — Academic Registry Hub.</p>
        </div>
    </footer>

<script type="module">
        import { api } from '../js/api.js';

        let students = [];
        let records = [];

        async function initializeRegistry() {
            const preloader = document.getElementById('preloader');
            try {
                // Fetch Initial Data
                students = await api.academic.getAllStudents();
                records = await api.academic.getFullAttendanceHistory();
                
                renderTable();
            } catch (error) {
                console.error("Registry Load Error:", error);
            } finally {
                if (preloader) {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }
            }
        }

        function renderStats() {
            document.getElementById('totalStudents').innerText = students.length;
            let p = records.filter(r => r.status === 'Present').length;
            let a = records.filter(r => r.status === 'Absent').length;
            document.getElementById('presentToday').innerText = p;
            document.getElementById('absentToday').innerText = a;
            document.getElementById('percent').innerText = records.length ? Math.round((p / records.length) * 100) + "%" : "0%";
        }

        function renderTable() {
            let tbody = document.getElementById('tbody');
            tbody.innerHTML = "";
            let q = document.getElementById('search').value.toLowerCase();
            
            records.filter(r => r.id.includes(q) || r.name.toLowerCase().includes(q))
                .forEach((r, i) => {
                    const isPresent = r.status === 'Present';
                    let statusHtml = `<span class="status-pill ${isPresent ? 'status-completed' : 'status-pending'}">${r.status}</span>`;
                    
                    let tr = document.createElement('tr');
                    tr.style.background = isPresent ? 'rgba(34,197,94,0.03)' : 'rgba(239,68,68,0.03)';
                    tr.innerHTML = `
                        <td>${r.id}</td>
                        <td style="font-weight: 700;">${r.name}</td>
                        <td style="color: var(--iu-text-muted); font-size: 0.85rem;">${r.date}</td>
                        <td>${r.type}</td>
                        <td>${statusHtml}</td>
                        <td style="display: flex; gap: 10px; justify-content: center;">
                            <button class="btn-premium btn-glass" style="padding: 5px 12px;" onclick="toggleStatus(${i})"><i class="fas fa-sync-alt"></i></button>
                            <button class="btn-premium btn-glass" style="padding: 5px 12px; color: #ef4444;" onclick="del(${i})"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            renderStats();
            renderTimeline();
        }

        async function mark(present) {
            let idOrName = document.getElementById('search').value.trim();
            if (!idOrName) return;
            
            let student = students.find(s => s.id == idOrName || s.name.toLowerCase() == idOrName.toLowerCase());
            if (!student) return alert("System trace mismatch: Identity not found.");
            
            const preloader = document.getElementById('preloader');
            if (preloader) { preloader.style.display = 'flex'; preloader.style.opacity = '1'; }

            try {
                const date = document.getElementById('date').value || new Date().toISOString().split('T')[0];
                const type = document.getElementById('type').value;
                const status = present ? "Present" : "Absent";

                const result = await api.academic.submitAttendance({
                    id: student.id,
                    name: student.name,
                    date: date,
                    type: type,
                    status: status
                });

                if (result.success) {
                    records.push({ id: student.id, name: student.name, date, type, status });
                    renderTable();
                }
            } catch (err) {
                alert("Registry update failed: " + err.message);
            } finally {
                if (preloader) {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }
            }
        }

        function toggleStatus(i) {
            records[i].status = records[i].status === 'Present' ? 'Absent' : 'Present';
            renderTable();
        }

        function del(i) {
            if (confirm("Confirm record eradication?")) {
                records.splice(i, 1);
                renderTable();
            }
        }

        // Global functions for HTML
        window.renderTable = renderTable;
        window.mark = mark;
        window.toggleStatus = toggleStatus;
        window.del = del;
        window.exportPDF = exportPDF;

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.setFontSize(22);
            pdf.setTextColor(82, 45, 128); // Royal Purple
            pdf.text("Innovation University Attendance Report", 20, 20);
            
            pdf.setFontSize(12);
            pdf.setTextColor(100);
            pdf.text(`Generated: ${new Date().toLocaleString()}`, 20, 30);
            
            let y = 50;
            pdf.text("ID | NAME | DATE | TYPE | STATUS", 20, y);
            pdf.line(20, y+2, 190, y+2);
            y += 10;
            
            records.forEach(r => {
                if (y > 270) { pdf.addPage(); y = 20; }
                pdf.text(`${r.id} | ${r.name} | ${r.date} | ${r.type} | ${r.status}`, 20, y);
                y += 8;
            });
            pdf.save(`IU_Attendance_${new Date().toISOString().split('T')[0]}.pdf`);
        }

        function renderTimeline() {
            let recentList = document.getElementById("recentList");
            recentList.innerHTML = "";
            records.slice(-5).reverse().forEach(r => {
                const li = document.createElement("li");
                li.className = "timeline-item";
                li.innerHTML = `
                    <span><i class="fas fa-clock" style="color: var(--iu-accent); margin-right: 10px;"></i> ${r.date} - <strong>${r.name}</strong></span>
                    <span class="status-pill ${r.status === 'Present' ? 'status-completed' : 'status-pending'}" style="font-size: 0.65rem;">${r.status === 'Present' ? 'IN' : 'OUT'}</span>
                `;
                recentList.appendChild(li);
            });
        }

        // Sidebar Toggle
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if (menuToggle && navMenu) {
            menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', initializeRegistry);
    </script>
</body>
</html>
