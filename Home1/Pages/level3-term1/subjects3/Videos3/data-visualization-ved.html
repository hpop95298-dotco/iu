<div class="container-subject">

    <div class="subject-sidebar" id="lessonList">
        <h3>Data Visualization &amp; Analytics</h3>
    </div>

    <div class="subject-content" id="content">
        <div class="placeholder">▶️ Select a lecture</div>
    </div>

</div>

<script>
const lectures = [
    {
        title: "Lecture 1 – Introduction to Data Visualization",
        video: "https://www.youtube.com/embed/yourVideoID1",
        desc: "Overview of data visualization concepts."
    },
    {
        title: "Lecture 2 – Charts & Graphs",
        video: "https://www.youtube.com/embed/yourVideoID2",
        desc: "Using charts to represent data."
    },
    {
        title: "Lecture 3 – Data Analytics Basics",
        video: "https://www.youtube.com/embed/yourVideoID3",
        desc: "Basic analytical techniques."
    }
];

const lessonList = document.getElementById("lessonList");

lectures.forEach((lec, i) => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = lec.title;
    div.onclick = () => loadLecture(i);
    lessonList.appendChild(div);
});

function loadLecture(i) {
    const lec = lectures[i];
    document.getElementById("content").innerHTML = `
        <h3>${lec.title}</h3>
        <iframe src="${lec.video}" allowfullscreen></iframe>
        <p>${lec.desc}</p>
    `;
}
</script>


    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if(menuToggle && navMenu) {
            menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
        }
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if(preloader) {
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }, 800);
            }
        });
    </script>
