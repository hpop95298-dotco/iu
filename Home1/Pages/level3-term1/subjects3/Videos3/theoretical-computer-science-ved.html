<div class="container-subject">

    <!-- Sidebar -->
    <div class="subject-sidebar" id="lessonList">
        <h3>Introduction to Theoretical Computer Science</h3>
    </div>

    <!-- Content -->
    <div class="subject-content" id="content">
        <div class="placeholder">
            📘 Select a lecture to start learning Theoretical Computer Science
        </div>
    </div>

</div>

<script>
const lectures = [
    {
        title: "Lecture 1 – Introduction to TCS",
        video: "https://www.youtube.com/embed/RSNl7zS64uI",
        desc: "Overview of theoretical computer science and its importance."
    },
    {
        title: "Lecture 2 – Automata Theory",
        video: "https://www.youtube.com/embed/1ox_6tG9jUo",
        desc: "Learn about finite automata, regular languages, and applications."
    },
    {
        title: "Lecture 3 – Computability",
        video: "https://www.youtube.com/embed/5sUraV_Ps7E",
        desc: "Introduction to what can be computed and Turing machines."
    },
    {
        title: "Lecture 4 – Complexity Theory",
        video: "https://www.youtube.com/embed/5On6qRMEk24",
        desc: "Study of time and space complexity classes."
    },
    {
        title: "Lecture 5 – Advanced Topics",
        video: "https://www.youtube.com/embed/4BfZfwnX8GI",
        desc: "Additional concepts like NP-completeness and P vs NP."
    }
];

const lessonList = document.getElementById("lessonList");

lectures.forEach((lec, index) => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = lec.title;
    div.onclick = () => loadLecture(index);
    lessonList.appendChild(div);
});

function loadLecture(i) {
    const lec = lectures[i];
    document.getElementById("content").innerHTML = `
        <h3>${lec.title}</h3>
        <iframe src="${lec.video}" allowfullscreen></iframe>
        <p style="margin-top:15px;">${lec.desc}</p>
    `;
}
</script>


    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if(menuToggle && navMenu) {
            menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
        }
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if(preloader) {
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }, 800);
            }
        });
    </script>
