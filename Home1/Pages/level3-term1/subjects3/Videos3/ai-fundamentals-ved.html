<body class="faculty-theme">

        <div class="nav-container">
            <div class="logo">
                <img src="../../../../images/iu-logo.png" alt="IU Logo">

<div class="container-subject">

    <!-- Sidebar -->
    <div class="subject-sidebar" id="lessonList">
        <h3>Fundamentals of AI</h3>
    </div>

    <!-- Content -->
    <div class="subject-content" id="content">
        <div class="placeholder">
            🤖 Select a lecture to start learning Artificial Intelligence
        </div>
    </div>

</div>

<script>
const lectures = [
    {
        title: "Lecture 1 – Introduction to Artificial Intelligence",
        video: "https://www.youtube.com/embed/2ePf9rue1Ao",
        desc: "Overview of AI, history, and real-world applications."
    },
    {
        title: "Lecture 2 – Intelligent Agents",
        video: "https://www.youtube.com/embed/3w5dG7xk8a8",
        desc: "Understanding agents, environments, and rationality."
    },
    {
        title: "Lecture 3 – Problem Solving & Search",
        video: "https://www.youtube.com/embed/9cQwZt6E9sM",
        desc: "Search strategies and problem-solving techniques."
    },
    {
        title: "Lecture 4 – Machine Learning Basics",
        video: "https://www.youtube.com/embed/GwIo3gDZCVQ",
        desc: "Introduction to machine learning and data-driven models."
    },
    {
        title: "Lecture 5 – AI Ethics & Future",
        video: "https://www.youtube.com/embed/8nt3edWLgIg",
        desc: "Ethical issues and future directions of AI."
    }
];

const lessonList = document.getElementById("lessonList");

lectures.forEach((lec, index) => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = lec.title;
    div.onclick = () => loadLecture(index);
    lessonList.appendChild(div);
});

function loadLecture(i) {
    const lec = lectures[i];
    document.getElementById("content").innerHTML = `
        <h3>${lec.title}</h3>
        <iframe src="${lec.video}" allowfullscreen></iframe>
        <p style="margin-top:15px;">${lec.desc}</p>
    `;
}
</script>


    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if(menuToggle && navMenu) {
            menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
        }
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if(preloader) {
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }, 800);
            }
        });
    </script>
</body>
