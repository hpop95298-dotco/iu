<body class="faculty-theme">

<div class="container-subject">

    <!-- Sidebar -->
    <div class="subject-sidebar" id="lessonList">
        <h3>Web Application Development</h3>
    </div>

    <!-- Content -->
    <div class="subject-content" id="content">
        <div class="placeholder">
            🌐 Select a lecture to start learning Web Application Development
        </div>
    </div>

</div>

<script>
const lectures = [
    {
        title: "Lecture 1 – Introduction to Web Apps",
        video: "https://www.youtube.com/embed/3JluqTojuME",
        desc: "Overview of web applications, types, and architecture."
    },
    {
        title: "Lecture 2 – HTML & CSS Basics",
        video: "https://www.youtube.com/embed/pQN-pnXPaVg",
        desc: "Learning the structure and styling of web pages."
    },
    {
        title: "Lecture 3 – JavaScript Essentials",
        video: "https://www.youtube.com/embed/hdI2bqOjy3c",
        desc: "Client-side scripting and interactivity in web pages."
    },
    {
        title: "Lecture 4 – Frontend Frameworks",
        video: "https://www.youtube.com/embed/0DJnsF7kB1c",
        desc: "Introduction to frameworks like React and Angular."
    },
    {
        title: "Lecture 5 – Backend Development",
        video: "https://www.youtube.com/embed/L8WPWK9mS5M",
        desc: "Server-side programming and database integration."
    }
];

const lessonList = document.getElementById("lessonList");

lectures.forEach((lec, index) => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = lec.title;
    div.onclick = () => loadLecture(index);
    lessonList.appendChild(div);
});

function loadLecture(i) {
    const lec = lectures[i];
    document.getElementById("content").innerHTML = `
        <h3>${lec.title}</h3>
        <iframe src="${lec.video}" allowfullscreen></iframe>
        <p style="margin-top:15px;">${lec.desc}</p>
    `;
}
</script>


    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if(menuToggle && navMenu) {
            menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
        }
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if(preloader) {
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }, 800);
            }
        });
    </script>
</body>
