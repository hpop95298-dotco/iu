<body class="faculty-theme">

        <div class="nav-container">
            <div class="logo">
                <img src="../../../../images/iu-logo.png" alt="IU Logo">

<div class="container-subject">

    <!-- Sidebar -->
    <div class="subject-sidebar" id="lessonList">
        <h3>Software Engineering</h3>
    </div>

    <!-- Content -->
    <div class="subject-content" id="content">
        <div class="placeholder">
            🛠️ Select a lecture to start learning Software Engineering
        </div>
    </div>

</div>

<script>
const lectures = [
    {
        title: "Lecture 1 – Introduction to Software Engineering",
        video: "https://www.youtube.com/embed/6fzpVv3i1j8",
        desc: "Overview of software engineering, software life cycle and methodologies."
    },
    {
        title: "Lecture 2 – Requirements Analysis",
        video: "https://www.youtube.com/embed/DYFYt2kV9b8",
        desc: "Understanding requirements gathering and documentation."
    },
    {
        title: "Lecture 3 – Software Design",
        video: "https://www.youtube.com/embed/3F7tX5ZtB6U",
        desc: "Designing software architecture and UML diagrams."
    },
    {
        title: "Lecture 4 – Implementation & Coding",
        video: "https://www.youtube.com/embed/xnA94kEwL6k",
        desc: "Best practices for coding and implementing software modules."
    },
    {
        title: "Lecture 5 – Testing & Maintenance",
        video: "https://www.youtube.com/embed/5p_lNMPjRZk",
        desc: "Testing strategies and software maintenance techniques."
    }
];

const lessonList = document.getElementById("lessonList");

lectures.forEach((lec, index) => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = lec.title;
    div.onclick = () => loadLecture(index);
    lessonList.appendChild(div);
});

function loadLecture(i) {
    const lec = lectures[i];
    document.getElementById("content").innerHTML = `
        <h3>${lec.title}</h3>
        <iframe src="${lec.video}" allowfullscreen></iframe>
        <p style="margin-top:15px;">${lec.desc}</p>
    `;
}
</script>


    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if(menuToggle && navMenu) {
            menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
        }
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if(preloader) {
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }, 800);
            }
        });
    </script>
</body>
