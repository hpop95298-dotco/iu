<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Architecture Quizzes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">



    <!-- Design System Core -->
    <link rel="stylesheet" href="../../../../css/core/tokens.css">
    <link rel="stylesheet" href="../../../../css/core/base.css">
    <link rel="stylesheet" href="../../../../css/core/layout.css">
    <link rel="stylesheet" href="../../../../css/core/components.css">
    <link rel="stylesheet" href="../../../../css/core/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../../../../css/subject.css">
    
</head>
<body class="faculty-theme">
    <div id="preloader"><div class="spinner"></div></div>

<div class="back-btn-fixed" onclick="goToLevels()">🏠 Back </div>

<div class="subject-sidebar">
  <h2>Computer Architecture Quizzes</h2>
  <ul id="quizList">
    <li class="active" onclick="showQuiz(0)">Quiz 1</li>
    <li onclick="showQuiz(1)">Quiz 2</li>
    <li onclick="showQuiz(2)">Quiz 3</li>
    <li onclick="showQuiz(3)">Quiz 4</li>
    <li onclick="showQuiz(4)">Quiz 5</li>
  </ul>
</div>

<div class="main">
  <h1 id="quizTitle">Quiz 1</h1>
  <div class="quiz-card" id="quizContent"></div>
</div>

<script type="application/json" id="quiz-data">
[
  {"question":"What does CPU stand for?","options":["Central Processing Unit","Computer Primary Unit","Central Program Unit","Control Processing Unit"],"answer":0,"explanation":"CPU stands for Central Processing Unit."},
  {"question":"Which component is responsible for arithmetic operations?","options":["ALU","CU","RAM","ROM"],"answer":0,"explanation":"The ALU performs arithmetic and logic operations."},
  {"question":"What type of memory is volatile?","options":["RAM","ROM","Flash","Cache"],"answer":0,"explanation":"RAM loses data when power is off."},
  {"question":"What does 'pipelining' improve?","options":["CPU performance","RAM size","ROM speed","Power supply"],"answer":0,"explanation":"Pipelining improves CPU instruction throughput."},
  {"question":"What is the main function of the control unit (CU)?","options":["Directs CPU operations","Stores data","Performs arithmetic","Controls input devices"],"answer":0,"explanation":"CU directs the flow of instructions in the CPU."}
]
</script>

<script>
let quiz = JSON.parse(document.getElementById('quiz-data').textContent);
let currentQuestion = 0;
let userAnswers = [];

const quizContent = document.getElementById('quizContent');

function goToLevels(){ window.location.href="../../level2-quizzes.html"; }

function showQuiz(index){
  currentQuestion = 0;
  userAnswers = [];
  document.querySelectorAll('.sidebar li').forEach(li=>li.classList.remove('active'));
  document.querySelectorAll('.sidebar li')[index].classList.add('active');
  document.getElementById('quizTitle').innerText = 'Quiz ' + (index+1);
  loadQuestion();
}

function loadQuestion(){
  const q = quiz[currentQuestion];
  document.getElementById("quizTitle").innerText = `Quiz ${currentQuestion+1}`;
  
  let html = `<div class="quiz-header"><span>INNOVATION UNIVERSITY</span><h3>Computer Architecture – Quiz</h3></div>`;
  html += `<div class="progress"><div class="progress-bar" style="width:${((currentQuestion+1)/quiz.length)*100}%"></div></div>`;
  html += `<div class="question-count">Question ${currentQuestion+1} of ${quiz.length}</div>`;
  html += `<h5>${q.question}</h5>`;
  q.options.forEach((opt,i)=>{
    let checked = userAnswers[currentQuestion]===i?"checked":"";
    html += `<label class="option"><input type="radio" name="option" value="${i}" ${checked}> ${opt}</label>`;
  });
  html += `<button class="btn-next w-100 mt-3" onclick="nextQuestion()">${currentQuestion===quiz.length-1?'Finish Quiz':'Next Question'}</button>`;
  if(currentQuestion>0) html += `<button class="btn-next w-100 mt-2" onclick="prevQuestion()">Back Question</button>`;
  
  quizContent.innerHTML = html;
}

function nextQuestion(){
  const selected = document.querySelector('input[name="option"]:checked');
  if(!selected){ alert("Please select an answer"); return; }
  userAnswers[currentQuestion] = parseInt(selected.value);
  if(currentQuestion<quiz.length-1){ currentQuestion++; loadQuestion(); } 
  else { showResult(); }
}

function prevQuestion(){
  if(currentQuestion>0){ currentQuestion--; loadQuestion(); }
}

function showResult(){
  let score = 0;
  userAnswers.forEach((ans,i)=>{ if(ans===quiz[i].answer) score++; });
  let status = score/quiz.length>=0.5?`<span class="pass">PASS</span>`:`<span class="fail">FAIL</span>`;
  quizContent.innerHTML = `
    <div class="result text-center p-4" style="background: rgba(255,255,255,0.3); border-radius: 18px; backdrop-filter: blur(20px);">
      <h2>Quiz Completed</h2>
      <p>Your Score: <span style="font-size:32px;">${score} / ${quiz.length}</span></p>
      <p>${status}</p>
      <button class="btn-next mt-2" onclick="reviewAnswers()">Review Answers</button>
      <button class="btn-secondary mt-2" onclick="showQuiz(0)">Retake Quiz</button>
    </div>
  `;
}

function reviewAnswers(){
  let html = `<h3 class="mb-4 text-center">Review Answers</h3>`;
  quiz.forEach((q,i)=>{
    html += `<div class="border p-3 mb-3 rounded"><h6>Q${i+1}. ${q.question}</h6>`;
    q.options.forEach((opt,j)=>{
      let cls="", icon="";
      if(j===q.answer){ cls="correct"; icon=" ✅"; }
      if(userAnswers[i]===j && j!==q.answer){ cls="wrong"; icon=" ❌"; }
      html += `<div class="${cls}">${opt}${icon}</div>`;
    });
    html += `<div class="explanation"><b>Explanation:</b> ${q.explanation}</div></div>`;
  });
  html += `<div class="text-center mt-3">
    <button class="btn-next" onclick="showQuiz(0)">Retake Quiz</button>
    <button class="btn-next ms-2" onclick="goToLevels()">Back to Computer Architecture</button>
  </div>`;
  quizContent.innerHTML = html;
}

// Load first quiz by default
showQuiz(0);
</script>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if(menuToggle && navMenu) {
            menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
        }
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            if(preloader) {
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }, 800);
            }
        });
    </script>
</body>
</html>
