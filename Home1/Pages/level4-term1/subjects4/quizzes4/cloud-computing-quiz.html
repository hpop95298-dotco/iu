<script type="application/json" id="quiz-data">
[
  {"question":"What does IaaS stand for?","options":["Infrastructure as a Service","Information as a Service","Internet as a Service","Integration as a Service"],"answer":0,"explanation":"IaaS provides virtualized computing resources over the internet."},
  {"question":"Which is a public cloud provider?","options":["Private Server","AWS","Local Data Center","Internal LAN"],"answer":1,"explanation":"Amazon Web Services (AWS) is a leading public cloud provider."},
  {"question":"What is SaaS?","options":["Software as a Service","System as a Service","Security as a Service","Storage as a Service"],"answer":0,"explanation":"SaaS allows users to connect to and use cloud-based apps over the Internet."},
  {"question":"What is a Hybrid Cloud?","options":["Only private cloud","Only public cloud","Combination of public and private clouds","A local network"],"answer":2,"explanation":"Hybrid cloud combines public and private cloud infrastructure."},
  {"question":"What is the main benefit of Cloud Computing?","options":["Scalability","High Cost","Low Speed","Less Security"],"answer":0,"explanation":"Cloud computing allows systems to scale up or down based on demand."}
]
</script>

<script>
let quiz = JSON.parse(document.getElementById('quiz-data').textContent);
let currentQuestion = 0;
let userAnswers = [];
const quizContent = document.getElementById('quizContent');

function loadQuestion(){
  const q = quiz[currentQuestion];
  document.getElementById("quizTitle").innerText = `Question ${currentQuestion+1}`;
  let html = `<div class="quiz-header"><span>INNOVATION UNIVERSITY</span><h3>Cloud Computing – Quiz</h3></div>`;
  html += `<div class="progress"><div class="progress-bar" style="width:${((currentQuestion+1)/quiz.length)*100}%"></div></div>`;
  html += `<h5>${q.question}</h5>`;
  q.options.forEach((opt,i)=>{ html += `<label class="option"><input type="radio" name="option" value="${i}"> ${opt}</label>`; });
  html += `<button class="btn-next w-100 mt-3" onclick="nextQuestion()">${currentQuestion===quiz.length-1?'Finish':'Next'}</button>`;
  quizContent.innerHTML = html;
}

function nextQuestion(){
  const selected = document.querySelector('input[name="option"]:checked');
  if(!selected){ alert("Select an answer"); return; }
  userAnswers[currentQuestion] = parseInt(selected.value);
  if(currentQuestion<quiz.length-1){ currentQuestion++; loadQuestion(); } else { showResult(); }
}

function showResult(){
  let score = 0;
  userAnswers.forEach((ans,i)=>{ if(ans===quiz[i].answer) score++; });
  quizContent.innerHTML = `<div class="result text-center p-4"><h2>Completed!</h2><p style="font-size:32px;">${score} / ${quiz.length}</p><button class="btn-next mt-2" onclick="location.reload()">Retake</button></div>`;
}
loadQuestion();
</script>


    


<script>

</script>
